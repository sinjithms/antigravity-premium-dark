<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiGravity Premium Dark</title>
    <!-- Modern SEO Meta Tags -->
    <meta name="description" content="A futuristic glassmorphism dark extension with an interactive 3D particle gravity engine. Elevate your browsing aesthetics instantly.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(148, 163, 184, 0.2);
            --glass-blur: blur(40px);
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            cursor: none; /* Custom cursor */
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            selection-background: var(--accent);
        }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: #000;
        }

        #bg-image {
            width: 100vw;
            height: 100vh;
            object-fit: cover !important;
            filter: brightness(0.7) contrast(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
            pointer-events: none;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .premium-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            animation: pulseBadge 3s infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { box-shadow: 0 0 10px rgba(56, 189, 248, 0); }
            50% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 18px 40px;
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            background: rgba(30, 41, 59, 0.85);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .cta-button:hover::before {
            left: 150%;
        }

        /* Abstract UI elements */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            margin-top: 5rem;
            display: flex;
            gap: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: float 6s infinite ease-in-out;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Custom Cursor */
        #customCursor {
            position: fixed;
            width: 24px;
            height: 24px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }
        
        .cursor-inner {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
        }
        
        .cursor-outer {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(56, 189, 248, 0.5);
            border-radius: 50%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        
        .cta-button:hover ~ #customCursor .cursor-outer {
            transform: scale(1.5);
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

    </style>
</head>
<body>
    <div id="customCursor">
        <div class="cursor-outer"></div>
        <div class="cursor-inner"></div>
    </div>

    <div id="bg-container">
        <img src="images/theme_ntp_background.png" alt="Nebula Background" id="bg-image">
    </div>
    <div class="overlay"></div>

    <canvas id="particleCanvas"></canvas>

    <main class="hero">
        <div class="premium-badge">Next-Gen New Tab Engine</div>
        <h1>AntiGravity<br>Premium Dark</h1>
        <p>Transform your browser into a deeply aesthetic, cinematic viewport. Featuring a bespoke glassmorphism UI and a physics-based interactive particle engine.</p>
        
        <a href="https://chrome.google.com/webstore/detail/dac0a0f4-1c52-4926-a331-d26fb848a599" class="cta-button" target="_blank">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM11 19.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            Add to Chrome (Free)
        </a>

        <div class="glass-card">
            <div class="feature">
                <div class="feature-icon">✨</div>
                <div style="font-weight: 600;">Physics Engine</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🌌</div>
                <div style="font-weight: 600;">Dark Nebula</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div style="font-weight: 600;">Zero FPS Drop</div>
            </div>
        </div>
    </main>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('customCursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // AntiGravity Particle Engine Web Version
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -1000, y: -1000, radius: 400 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init(); 
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });

        class Particle {
            constructor(layer) {
                this.layer = layer;
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.vx = (Math.random() - 0.5) * 0.15;
                this.vy = (Math.random() - 0.5) * 0.15;

                const palette = ['rgba(167, 139, 250, ', 'rgba(59, 130, 246, ', 'rgba(34, 211, 238, ', 'rgba(255, 255, 255, '];
                const baseColor = palette[Math.floor(Math.random() * palette.length)];

                if (this.layer === 0) {
                    this.size = Math.random() * 2.5 + 0.8;
                    this.density = (Math.random() * 2) + 0.5;
                    this.opacity = Math.random() * 0.3 + 0.15;
                } else if (this.layer === 1) {
                    this.size = Math.random() * 3.0 + 1.5;
                    this.density = (Math.random() * 10) + 5;
                    this.opacity = Math.random() * 0.5 + 0.25;
                } else {
                    this.size = Math.random() * 4.0 + 2.0;
                    this.density = (Math.random() * 25) + 10;
                    this.opacity = Math.random() * 0.8 + 0.4;
                }
                this.color = baseColor + this.opacity + ')';
            }
            update() {
                this.baseX += this.vx; this.baseY += this.vy;
                if (this.baseX < 0) this.baseX = canvas.width;
                if (this.baseX > canvas.width) this.baseX = 0;
                if (this.baseY < 0) this.baseY = canvas.height;
                if (this.baseY > canvas.height) this.baseY = 0;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    let moveX = forceDirectionX * force * this.density * 1.5;
                    let moveY = forceDirectionY * force * this.density * 1.5;
                    this.x -= moveX; this.y -= moveY;
                } else {
                    this.x += this.vx * 2; this.y += this.vy * 2;
                    if (Math.abs(this.x - this.baseX) > 0.1) this.x -= (this.x - this.baseX) / 30;
                    if (Math.abs(this.y - this.baseY) > 0.1) this.y -= (this.y - this.baseY) / 30;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            const area = canvas.width * canvas.height;
            const totalDesired = Math.min(Math.floor(area / 1000), 1800);
            for (let i = 0; i < Math.floor(totalDesired * 0.7); i++) particles.push(new Particle(0));
            for (let i = 0; i < Math.floor(totalDesired * 0.2); i++) particles.push(new Particle(1));
            for (let i = 0; i < Math.floor(totalDesired * 0.1); i++) particles.push(new Particle(2));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'screen'; 
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
